<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Delta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
.splash{text-align:center;opacity:0;animation:fadeIn .6s ease-out forwards}
.logo-wrap{width:80px;height:80px;margin:0 auto 1.5rem;animation:pulse 2s ease-in-out infinite}
.logo-wrap svg{width:100%;height:100%;filter:drop-shadow(0 0 20px rgba(56,152,236,.3))}
.logo-wrap svg g{fill:#3898ec}
h1{font-size:1.5rem;font-weight:600;letter-spacing:-.02em;margin-bottom:.25rem}
p{font-size:.875rem;opacity:.5}
.dots span{animation:blink 1.4s infinite both}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
.error-msg{display:none;margin-top:1rem;font-size:.8rem;opacity:.6}
.retry-btn{display:none;margin-top:1rem;padding:.5rem 1.25rem;background:#3898ec;color:#fff;border:none;border-radius:6px;font-size:.875rem;cursor:pointer;transition:opacity .2s}
.retry-btn:hover{opacity:.8}
@keyframes fadeIn{to{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:.8}}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
</style>
</head>
<body>
<div class="splash">
<div class="logo-wrap">

</div>
<h1>Delta</h1>
<p id="status">Starting<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
<p id="error" class="error-msg"></p>
<button id="retry" class="retry-btn" onclick="retryConnect()">Retry</button>
</div>
<script>
var serverUrl = '';
function showError(url) {
  serverUrl = url;
  document.getElementById('status').textContent = 'Server took too long to start';
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').textContent = 'The server did not respond in time. Click Retry to try again.';
  document.getElementById('retry').style.display = 'inline-block';
  document.querySelector('.logo-wrap').style.animation = 'none';
}
function retryConnect() {
  document.getElementById('status').innerHTML = 'Reconnecting<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
  document.getElementById('error').style.display = 'none';
  document.getElementById('retry').style.display = 'none';
  document.querySelector('.logo-wrap').style.animation = 'pulse 2s ease-in-out infinite';
  if (serverUrl) {
    var attempts = 0;
    var maxAttempts = 120;
    var timer = setInterval(function() {
      attempts++;
      fetch(serverUrl + '/props', { method: 'GET' })
        .then(function() {
          clearInterval(timer);
          window.location.replace(serverUrl);
        })
        .catch(function() {
          if (attempts >= maxAttempts) {
            clearInterval(timer);
            showError(serverUrl);
          }
        });
    }, 250);
  }
}
</script>
